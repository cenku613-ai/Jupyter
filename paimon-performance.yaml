apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: paimon-perf-cluster
  namespace: default 
spec:
  # Point this to your newly built Flink 1.20 private image
  image: your-internal-registry.com/data-eng/paimon-flink:1.20.0-v1
  flinkVersion: v1_20
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "4"
    s3.endpoint: "http://your-minio-service.default.svc.cluster.local:9000"
    s3.access-key: "YOUR_MINIO_ACCESS_KEY"
    s3.secret-key: "YOUR_MINIO_SECRET_KEY"
    s3.path.style.access: "true"
  serviceAccount: flink
  jobManager:
    resource:
      memory: "2048m"
      cpu: 1
  taskManager:
    resource:
      memory: "4096m"
      cpu: 2
